# Render Blueprint — one-click deploy of the FastAPI backend.
# In the Render dashboard: New > Blueprint, point it at this repo, then set
# GROQ_API_KEY (and optionally the Langfuse keys) as environment variables.
# The Docker build does not run ingestion; promote/copy a prebuilt Chroma index
# separately or run ingestion manually in an environment where the cost is OK.
services:
  - type: web
    name: agentic-rag-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false          # set this secret in the dashboard
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: CHROMA_PATH
        value: /app/storage/experiment_chroma
      - key: COLLECTION_NAME
        value: banking_exp_full_e5_small_v2_1500_255
      - key: EMBEDDING_MODEL
        value: intfloat/e5-small-v2
      - key: EMBEDDING_QUERY_PREFIX
        value: "query: "
      - key: EMBEDDING_PASSAGE_PREFIX
        value: "passage: "
      - key: WARM_BM25_ON_STARTUP
        value: "false"
      - key: ENABLE_SPARSE_BM25
        value: "false"
      - key: CORS_ORIGINS
        value: "https://agentic-rag-pied.vercel.app"
      - key: ENABLE_WEB_SEARCH
        value: "true"
      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: LANGFUSE_SECRET_KEY
        sync: false
